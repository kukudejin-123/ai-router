# 生产环境配置
spring:
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/ai_router
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}

